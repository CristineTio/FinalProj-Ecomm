<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Checkout — payment form, delivery/pickup, and order summary." />
    <title>Coconut Coir Co. — Checkout</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ["ui-sans-serif", "system-ui", "Segoe UI", "Inter", "sans-serif"] } } },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="font-sans selection:bg-orange-500/30 selection:text-white">
    <header data-cc-nav></header>

    <main id="main" class="container-safe pt-6 pb-14">
      <section class="reveal" data-cc-checkout></section>
    </main>

    <footer data-cc-footer></footer>

    <script type="module">
      import { initPage } from "./app.js";
      initPage();
    </script>
  </body>
</html>
