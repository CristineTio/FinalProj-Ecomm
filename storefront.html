<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Storefront — browse coconut coir products with search, filters, and sorting." />
    <title>Coconut Coir Co. — Storefront</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: { fontFamily: { sans: ["ui-sans-serif", "system-ui", "Segoe UI", "Inter", "sans-serif"] } },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="font-sans selection:bg-orange-500/30 selection:text-white">
    <header data-cc-nav></header>

    <main id="main" class="container-safe pt-6 pb-14">
      <section class="surface rounded-[2rem] p-7 md:p-10 reveal">
        <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-5">
          <div class="max-w-2xl">
            <div class="chip">Catalog</div>
            <h1 class="mt-5 text-3xl md:text-5xl font-black tracking-tight">
              Browse our storefront <span class="grad-text">with search and filters</span>.
            </h1>
            <p class="mt-4 text-white/65 text-lg">
              Explore coconut coir products for hydroponics, potting mixes, and soil conditioning.
            </p>
          </div>


        <div class="hairline border-t mt-7 pt-7" id="catalogFilters"></div>
      </section>

      <section class="mt-6">
        <div id="catalogGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </section>
    </main>

    <footer data-cc-footer></footer>

    <script type="module">
      import { initPage } from "./app.js";
      initPage();
    </script>
  </body>
</html>
